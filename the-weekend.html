<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule — K &amp; M</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="site.css" />
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="botanicals.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">
const SCHEDULE = [
  { day: 'Friday afternoon', title: 'Family & friends', optional: true,
    desc: 'An easy afternoon with family and close family friends as everyone rolls into the hills. Low-key, no agenda.' },
  { day: 'Friday evening', title: 'Friends gathering', optional: true,
    desc: 'An evening hang for friends settling in for the weekend. Come find us.' },
  { day: 'Saturday afternoon', title: 'The wedding', optional: false,
    desc: 'The ceremony will take place on the Tennis Lawn at the Ruins. Obviously this is the event we most hope you can make — the whole reason we are all out here.' },
  { day: 'Saturday evening', title: 'Reception dinner', optional: false,
    desc: 'Dinner, cake, and dancing once the sun drops behind the ridge.' },
  { day: 'Sunday', title: 'Send-off brunch', optional: true,
    desc: 'A low-key brunch before you point yourself home.' },
];

function ScheduleItem({ item }) {
  return (
    <div className="tl-item reveal">
      <span className="node" />
      <div className="tl-day">{item.day}</div>
      <div className="tl-title">
        {item.title}
        {item.optional && <span className="tl-optional">Optional</span>}
      </div>
      <p className="tl-desc">{item.desc}</p>
    </div>
  );
}

function TheDay() {
  useReveal();
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

  return (
    <React.Fragment>
      <Nav active="the-weekend.html" />

      <PageHead
        eyebrow="The weekend"
        title="What we know now"
        lede={"More of a long weekend than a single day.\nHere's the shape of the schedule so you can plan."} />

      {/* ---- INTRO PHOTO ---- */}
      {/* ---- SCHEDULE ---- */}
      <section className="section" style={{ paddingTop: 'clamp(40px,6vw,76px)' }}>
        <div className="narrow">
          <div className="reveal" style={{ marginBottom: 40 }}>
            <p className="editorial-label">Specifics to come</p>
            <h2 className="section-title" style={{ marginTop: 14 }}>Pick and choose</h2>
            <p className="lede" style={{ marginTop: 18 }}>
              Every event is come-as-you-can. We'd of course love everyone at the wedding and
              reception on Saturday — the rest of the weekend is yours to craft.
            </p>
          </div>
          <div className="timeline">
            {SCHEDULE.map((item) => <ScheduleItem key={item.title} item={item} />)}
          </div>
          <p className="caption reveal" style={{ marginTop: 28, fontStyle: 'italic' }}>
            Times and finer details to come — we'll update this page as things firm up.
          </p>
        </div>
      </section>

      {/* ---- VENUE HISTORY ---- */}
      <section className="section" id="venue" style={{ background: 'var(--bark-50)', borderTop: '1px solid var(--line-soft)', borderBottom: '1px solid var(--line-soft)' }}>
        <div className="wrap">
          <div className="grid grid-2" style={{ alignItems: 'center', gap: 48 }}>
            <div className="reveal">
              <p className="eyebrow">The place</p>
              <h2 className="section-title" style={{ marginTop: 16 }}>The Ruins at Sassafras</h2>
              <p className="lede" style={{ marginTop: 20 }}>
                Two centuries ago this was a chair factory operated by Shakers —
                a community that built furniture famous for being simple, sound, and made to last.
              </p>
              <p style={{ color: 'var(--plum-500)', marginTop: 16 }}>
                What stands today is the chair factory, gardens, and open-air ruins, tended as a
                small museum. We love how it carries its history out in the open: weathered and
                still standing, ready to hold something new.
              </p>
              <div style={{ display: 'flex', gap: 22, marginTop: 28, flexWrap: 'wrap' }}>
                <a className="tlink" href={W.aboutVenueUrl} target="_blank" rel="noopener noreferrer">About the venue →</a>
                <a className="tlink" href={W.mapUrl} target="_blank" rel="noopener noreferrer">See it on the map →</a>
              </div>
            </div>
            <div className="reveal d1" style={{ display: 'flex', justifyContent: 'center' }}>
              <div className="card" style={{ background: 'var(--surface-card)', padding: 40, textAlign: 'center', maxWidth: 320 }}>
                <div style={{ display: 'flex', justifyContent: 'center' }}>
                  <ShakerChair size={150} color="var(--site-accent)" />
                </div>
                <div className="tl-day" style={{ marginTop: 22 }}>A SHAKER CHAIR FACTORY?</div>
                <p style={{ marginTop: 8, fontSize: 15, color: 'var(--plum-500)' }}>
                  It's cool. And has ruins. And during Kathryn and Matt's first conversation, Matt
                  described himself as a "sitting American."
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ---- COMFORT NOTE + PHOTOS ---- */}
      <section className="section">
        <div className="wrap">
          <div className="grid grid-2" style={{ alignItems: 'center', gap: 48 }}>
            <div className="reveal">
              <PhotoCarousel imgs={["images/day-1.jpg", "images/day-2.jpg", "images/day-3.jpg", "images/day-4.jpg"]} ratio="1 / 1" maxWidth={440} alt="The Ruins at Sassafras" />
            </div>
            <div className="reveal d1">
              <div className="callout">
                <h3>What to wear</h3>
                <p>
                  No dress code — we will celebrate you being comfortable. Late May in New Lebanon can
                  swing from very warm in the afternoon to quite chilly at night. Check the forecast close
                  to the weekend and pack to be easy in any weather, including a layer for after dark.
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ---- DUSK FOOTER ---- */}
      <DuskFooter>
        <p className="eyebrow">Next</p>
        <h2>Getting to the hills.</h2>
        <p className="lede" style={{ color: '#dcccdf', margin: '22px auto 0' }}>
          Airports, trains, where to stay, and what to do nearby — plus how to reach us if you need a
          ride or a place to land.
        </p>
        <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginTop: 32, flexWrap: 'wrap' }}>
          <a className="btn btn-on-deep" href="travel-and-stay.html">Travel & stay</a>
          <a className="btn btn-ghost-deep" href={W.rsvpUrl} target="_blank" rel="noopener noreferrer">RSVP</a>
        </div>
      </DuskFooter>
    </React.Fragment>
  );
}

function App() {
  return (<React.Fragment><TheDay /></React.Fragment>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
