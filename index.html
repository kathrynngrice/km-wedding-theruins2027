<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kathryn &amp; Matt — The Ruins at Sassafras</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="site.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="botanicals.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">

function FeatureCard({ icon, kicker, title, body, href, cta }) {
  return (
    <a href={href} className="card hover-lift feature-card" style={{ textDecoration: 'none' }}>
      <span className="ic"><i data-lucide={icon} style={{ width: 26, height: 26 }}></i></span>
      <div>
        <div className="tl-day" style={{ marginBottom: 6 }}>{kicker}</div>
        <h3 style={{ fontSize: "21px" }}>{title}</h3>
        <p style={{ marginTop: 8 }}>{body}</p>
      </div>
      <span className="more"><span className="tlink">{cta} &rarr;</span></span>
    </a>);

}

function Home() {
  useReveal();
  React.useEffect(() => {window.lucide && window.lucide.createIcons();});

  return (
    <React.Fragment>
      <Nav active="index.html" />

      {/* ---- HERO ---- */}
      <section className="hero" style={{ justifyContent: 'center', paddingTop: 110, paddingBottom: 250 }}>
        <div className="hero-glow" />
        <div className="sun-glow" />
        <div className="scene-layer" style={{ height: '100%', opacity: 0.58 }}><Mountains width={1500} height={620} color="#aeb6dd" fade={true} ridge={false} /></div>
        <div className="scene-layer" style={{ top: 16, bottom: 'auto' }}><StringLights width={1500} drops={22} /></div>
        <div className="scene-layer" style={{ height: 175 }}><Grasses width={1500} height={175} seed={5} /></div>
        <LupinRow />
        <div className="scene-layer" style={{ height: 92 }}><Grasses width={1500} height={92} seed={14} /></div>
        <div className="scene-fade-bottom" />

        <div className="hero-content">
          <p className="save">WE'RE GETTING MARRIED!</p>
          <h1 className="names"><Names /></h1>
          <div style={{ margin: '24px 0 18px' }}><Sep /></div>
          <p className="meta">
            {W.dayName}, {W.dateLong}
            <span className="venue">{W.venue} &middot; New Lebanon, New York</span>
          </p>
          <Countdown />
          <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginTop: 36, flexWrap: 'wrap' }}>
            <a className="btn btn-primary" href={W.rsvpUrl} target="_blank" rel="noopener noreferrer">RSVP</a>
            <a className="btn btn-ghost" href="the-weekend.html">See the day</a>
          </div>
        </div>
      </section>

      {/* ---- INTRO ---- */}
      <section className="section center">
        <div className="narrow reveal">
          <p className="editorial-label">We're getting married</p>
          <h2 className="section-title" style={{ marginTop: 18 }}>
            Join us at the ruins of a Shaker chair factory in upstate New York.
          </h2>
          <p className="lede" style={{ marginTop: 24 }}>Mountains and meadows, a pond, fire pits, and the standing timber frame of a place that's been making and remaking itself for two hundred years. Come for the wedding; stay for as much of the weekend as you'd like.</p>
        </div>
      </section>

      {/* ---- THREE WAYS IN ---- */}
      <section className="section--tight" style={{ paddingBottom: 8 }}>
        <div className="wrap">
          <div className="grid grid-3">
            <div className="reveal"><FeatureCard
                icon="calendar-heart" kicker="Schedule"
                title="Make your own adventure"
                body="Friday hangs, the Saturday wedding and reception, and an easy Sunday brunch. Pick and choose what you can make."
                href="the-weekend.html" cta="See the schedule" /></div>
            <div className="reveal d1"><FeatureCard
                icon="map" kicker="Travel & stay"
                title="Plan ahead"
                body="Albany airport and train station are nearest, but cars are still needed for last-mile arrival. Here's how to get here, where to stay, and what to do nearby."
                href="travel-and-stay.html" cta="Plan your trip" /></div>
            <div className="reveal d2"><FeatureCard
                icon="trees" kicker="The venue"
                title="Learn about The Ruins"
                body="A historic Shaker chair-factory, restored as a space for celebrations honoring those who shared the space before."
                href="the-weekend.html#venue" cta="About the venue" /></div>
          </div>
        </div>
      </section>

      {/* ---- COMFORT NOTE + PHOTOS ---- */}
      <section className="section">
        <div className="wrap">
          <div className="grid grid-2" style={{ alignItems: 'center', gap: 48 }}>
            <div className="reveal">
              <PhotoCarousel imgs={["images/home-1.jpg", "images/home-2.jpg", "images/home-3.jpg", "images/home-4.jpg"]} ratio="1 / 1" maxWidth={440} alt="Kathryn and Matt" />
            </div>
            <div className="reveal d1">
              <div className="callout">
                <h3>Come comfortable</h3>
                <p>We have no dress code for any events in mind — we'll celebrate you being comfortable. Late May in New Lebanon can swing from hot in the afternoon sun to quite chilly once the sun drops. Check the forecast close to the weekend and pack a layer or two so you're comfortable in any weather.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ---- DUSK FOOTER ---- */}
      <DuskFooter>
        <p className="eyebrow">A small ask</p>
        <h2>Let us help you get here — or let us house you.</h2>
        <p className="lede" style={{ color: '#dcccdf', margin: '22px auto 0' }}>
          Need a hand arranging a ride or a free place to stay? Want to pitch in on something for the
          weekend? Reach out — anyone helping out, we'll happily put up.
        </p>
        <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginTop: 32, flexWrap: 'wrap' }}>
          <a className="btn btn-on-deep" href={W.rsvpUrl} target="_blank" rel="noopener noreferrer">RSVP</a>
          <a className="btn btn-ghost-deep" href={'mailto:' + W.contactEmail}>Get in touch</a>
        </div>
      </DuskFooter>
    </React.Fragment>);

}

function App() {
  return <React.Fragment><Home /></React.Fragment>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
