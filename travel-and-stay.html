<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Travel — K &amp; M</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="site.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="botanicals.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">
function InfoRow({ icon, title, dist, children }) {
  return (
    <div className="inforow reveal">
      <span className="ic"><i data-lucide={icon} style={{ width: 24, height: 24 }}></i></span>
      <div className="body">
        <h4>{title}{dist && <span className="dist"> · {dist}</span>}</h4>
        <p>{children}</p>
      </div>
    </div>
  );
}

function Travel() {
  useReveal();
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

  return (
    <React.Fragment>
      <Nav active="travel-and-stay.html" />

      <PageHead
        eyebrow="Getting here"
        title="Travel & stay"
        lede={"Hancock Shaker Village sits between the hills of Western MA.\nIt's rural up here, so we recommend renting a car or carpooling if you can."} />

      {/* ---- DIRECTIONS BANNER ---- */}
      <section className="section--tight" style={{ paddingTop: 'clamp(40px,6vw,76px)' }}>
        <div className="narrow">
          <div className="card reveal" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap' }}>
            <div>
              <div className="tl-day">The venue</div>
              <h3 style={{ margin: '6px 0 4px' }}>{W.venue}</h3>
              <p style={{ fontSize: 15 }}>{W.addr}</p>
            </div>
            <a className="btn btn-primary" href={W.directionsUrl} target="_blank" rel="noopener noreferrer">
              <i data-lucide="navigation" style={{ width: 16, height: 16 }}></i> Get directions
            </a>
          </div>
        </div>
      </section>

      {/* ---- GETTING THERE ---- */}
      <section className="section" style={{ paddingTop: 24 }}>
        <div className="narrow">
          <div className="reveal" style={{ marginBottom: 24 }}>
            <p className="editorial-label">How to get here</p>
            <h2 className="section-title" style={{ marginTop: 14 }}>By car, air, train, or bus</h2>
          </div>
          <div>
            <InfoRow icon="car-front" title="By car — recommended">
              The easiest way in. Rent a car or carpool with other guests where you can; parking at the
              venue is straightforward. Tap <a className="tlink" style={{ borderBottom: 'none', padding: 0 }} href={W.directionsUrl} target="_blank" rel="noopener noreferrer">Get directions</a> above for live routing to the address.
            </InfoRow>
            <InfoRow icon="plane" title="By air — Albany International Airport (ALB)" dist="~45 min drive to venue">
              The nearest airport, about forty-five minutes from the venue area. Pick up a rental car at
              the airport, or coordinate a carpool with other guests flying in around the same time.
            </InfoRow>
            <InfoRow icon="train-front" title="By train — Pittsfield, MA" dist="~15 min drive to venue">
              The nearest train station, roughly fifteen minutes out. You'll still need a car or a ride
              from the station — there's no direct transit to the area, and nonexistent taxi/ridesharing. 
              Alternatively, the Albany, NY train station is about 40min out by car.
            </InfoRow>
            <InfoRow icon="bus" title="By bus">
              The closest stop is Pittsfield, MA, ~10min drive to venue, or Albany, NY (Peter Pan, Greyhound, Megabus), about 40min from venue. From there,
              plan to rent a car or carpool the rest of the way.
            </InfoRow>
          </div>
        </div>
      </section>

      {/* ---- WHERE TO STAY ---- */}
      <section className="section" style={{ background: 'var(--bark-50)', borderTop: '1px solid var(--line-soft)', borderBottom: '1px solid var(--line-soft)' }}>
        <div className="wrap">
          <div className="grid grid-2" style={{ alignItems: 'center', gap: 48 }}>
            <div className="reveal">
              <p className="eyebrow">Where to stay</p>
              <h2 className="section-title" style={{ marginTop: 16 }}>A place to land</h2>
              <p className="lede" style={{ marginTop: 20 }}>
                We have a short list of nearby places to stay — inns, rentals, and rooms
                within an easy drive of the venue.
              </p>
              <p style={{ color: 'var(--plum-500)', marginTop: 16 }}>
                Booking early is wise; late May is a lovely time in the area and rooms will go quickly for this weekend.
              </p>
              <div style={{ marginTop: 26 }}>
                <a className="btn btn-primary" href={W.staysUrl} target="_blank" rel="noopener noreferrer">
                  <i data-lucide="bed-double" style={{ width: 16, height: 16 }}></i> See where to stay
                </a>
              </div>
            </div>
            <div className="reveal d1" style={{ display: 'flex', justifyContent: 'center' }}>
              <div className="card" style={{ background: 'var(--surface-card)', padding: 40, textAlign: 'center', maxWidth: 320 }}>
                <div style={{ display: 'flex', justifyContent: 'center' }}>
                  <Lupin height={168} tone="lav" seed={4} stroke="var(--site-accent)" />
                </div>
                <div className="tl-day" style={{ marginTop: 22 }}>why this place?</div>
                <p style={{ marginTop: 8, fontSize: 15, color: 'var(--plum-500)' }}>
                  Kathryn & Matt both went to college in Western MA, and Kathryn's parents moved nearby in 2014. When Kathryn's parents toured their soon-to-be house facing her college town, Kathryn's response was "WHAT?". Shock, horror, and excitement all mixed together.
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ---- THINGS TO DO ---- */}
      <section className="section">
        <div className="wrap">
          <div className="reveal" style={{ marginBottom: 32 }}>
            <p className="editorial-label">While you're here</p>
            <h2 className="section-title" style={{ marginTop: 14 }}>Things to do nearby</h2>
          </div>
          <div className="grid grid-3">
            <div className="card reveal feature-card">
              <span className="ic"><i data-lucide="mountain" style={{ width: 26, height: 26 }}></i></span>
              <div><h3>The Berkshires</h3><p style={{ marginTop: 8 }}>This corner of Massachusetts has cute towns (e.g., Lenox, MA), art museums (e.g., Mass Moca, The Clark, Norman Rockwell), performances (Tanglewood, Jacob's Pillow), and hiking in any direction.</p></div>
            </div>
            <div className="card reveal d1 feature-card">
              <span className="ic"><i data-lucide="landmark" style={{ width: 26, height: 26 }}></i></span>
              <div><h3>History</h3><p style={{ marginTop: 8 }}>The region is full of it — the Mount Lebanon Shaker site in addition to Hancock Shaker Village. Plus, just over the state line in New York, Roaring 20s Brewery, the brewery Kathryn's parents opened in 2021 in the building of an old school house.</p></div>
            </div>
            <div className="card reveal d2 feature-card">
              <span className="ic"><i data-lucide="leaf" style={{ width: 26, height: 26 }}></i></span>
              <div><h3>Farms & trails</h3><p style={{ marginTop: 8 }}>Farm stands, berry picking, swimming holes, and quiet walks. Lots to choose from.</p></div>
            </div>
          </div>
        </div>
      </section>

      {/* ---- DUSK FOOTER ---- */}
      <DuskFooter>
        <h2>We hope to see you there.</h2>
        <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginTop: 32, flexWrap: 'wrap' }}>
          <a className="btn btn-on-deep" href={'mailto:' + W.contactEmail}>Get in touch</a>
          <a className="btn btn-ghost-deep" href={W.rsvpUrl} target="_blank" rel="noopener noreferrer">RSVP</a>
        </div>
      </DuskFooter>
    </React.Fragment>
  );
}

function App() {
  return (<React.Fragment><Travel /></React.Fragment>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
